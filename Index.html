<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sazafy Web deployment </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        cyber: {
                            black: '#050505',
                            dark: '#0a0a0f',
                            gray: '#1a1a2e',
                            cyan: '#00f0ff',
                            purple: '#b829dd',
                            pink: '#ff006e',
                            blue: '#3a0ca3'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'scan': 'scan 8s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px #00f0ff, 0 0 10px #00f0ff' },
                            '100%': { boxShadow: '0 0 20px #00f0ff, 0 0 40px #00f0ff' },
                        },
                        scan: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
         }
        
		   @media (max-width: 768px) {
           .custom-cursor,
           .cursor-dot {
           display: none;
        }

           body {
           cursor: auto;
        }
        }
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #00f0ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            mix-blend-mode: difference;
        }
        
        .cursor-dot {
            width: 4px;
            height: 4px;
            background: #00f0ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease;
        }
        
        .cursor-hover {
            transform: scale(2);
            background: rgba(0, 240, 255, 0.1);
        }
        
        .glitch {
            position: relative;
        }
        
        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff006e;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }
        
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00f0ff;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }
        
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 85px, 0); }
            20% { clip: rect(63px, 9999px, 130px, 0); }
            40% { clip: rect(25px, 9999px, 145px, 0); }
            60% { clip: rect(89px, 9999px, 55px, 0); }
            80% { clip: rect(45px, 9999px, 99px, 0); }
            100% { clip: rect(12px, 9999px, 120px, 0); }
        }
        
        .grid-bg {
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .hexagon {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.3) 0%, transparent 70%);
            transform: scale(0);
            animation: ripple-effect 0.6s ease-out;
            pointer-events: none;
        }
        
        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
			Background: #071424;
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.8s cubic-bezier(0.76, 0, 0.24, 1);
             );
          }
        
        .page-transition.active {
            transform: scaleY(1);
            transform-origin: top;
        }
        
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
            color: #00f0ff;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .service-card {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.8) 0%, rgba(10, 10, 15, 0.9) 100%);
            border: 1px solid rgba(0, 240, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .service-card:hover {
            border-color: #00f0ff;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
            transform: translateY(-5px);
        }
        
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 9998;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 10px #00f0ff;
            animation: scan 8s linear infinite;
            pointer-events: none;
            z-index: 9997;
        }
    </style>
	
	<!-- Logo of Website -->
	<link rel="icon" type="image/png" href="https://image2url.com/r2/default/images/1773567981464-dce0c82c-dd70-4952-88a2-4f4d8ff55f5c.jpg">
	
</head>
<body class="antialiased selection:bg-cyber-cyan selection:text-cyber-black">

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="cursor"> </div>
    <div class="cursor-dot" id="cursorDot"> </div>
    
    <!-- Effects -->
    <div class="noise"></div>
    <div class="scanline"> </div>
    
    <!-- Page Transition Overlay -->
    <div class="page-transition" id="pageTransition"> </div>

    <!-- Landing Page -->
    <div id="landingPage" class="relative min-h-screen flex flex-col items-center justify-center grid-bg">
        
        <!-- Animated Background Elements -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute top-20 left-10 w-64 h-64 bg-cyber-purple/20 rounded-full blur-[100px] animate-pulse-slow"></div>
            <div class="absolute bottom-20 right-10 w-96 h-96 bg-cyber-cyan/10 rounded-full blur-[120px] animate-pulse-slow" style="animation-delay: 2s;"></div>
             <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 
                 w-[300px] h-[300px] md:w-[600px] md:h-[600px] 
                 border border-cyber-cyan/10 rounded-full animate-spin"></div>
                 <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 
                     w-[200px] h-[200px] md:w-[400px] md:h-[400px] 
                       border border-cyber-purple/20 rounded-full animate-spin"></div>
        </div>

        <!-- Main Content -->
        <div class="relative z-10 text-center px-4 max-w-6xl mx-auto">
            
            <!-- Logo -->
            <div class="mb-8 animate-float">
                <div class="inline-block relative">
                    <div class="absolute inset-0 bg-cyber-cyan blur-xl opacity-20"></div>
                    <h1 class="relative text-5xl sm:text-6xl md:text-8xl lg:text-9xl font-display font-bold tracking-tighter glitch" data-text="SAZAFY">
                        SAZAFY
                    </h1>
                </div>
            </div>

            <!-- Tagline -->
            <div class="mb-12 space-y-4">
                <p class="text-cyber-cyan text-lg md:text-xl font-mono tracking-widest uppercase opacity-80">
                    <span class="typing-cursor" id="typingText"></span>
                </p>
                <p class="text-gray-400 text-sm md:text-base max-w-2xl mx-auto leading-relaxed">
                    Architecting digital experiences that transcend the ordinary. 
                    We build the future, one pixel at a time.
                </p>
            </div>

            <!-- Interactive Hint -->
            <div class="mt-16 relative group cursor-pointer" id="enterHint">
                <div class="absolute inset-0 bg-cyber-cyan/20 blur-xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                <div class="relative border border-cyber-cyan/30 rounded-full px-5 py-3 md:px-8 md:py-4 bg-cyber-dark/50 backdrop-blur-sm hover:border-cyber-cyan transition-all duration-300">
                    <span class="text-cyber-cyan font-mono text-sm tracking-[0.3em] uppercase flex items-center gap-3">
                        <span class="w-2 h-2 bg-cyber-cyan rounded-full animate-pulse"></span>
                        Click Here to Enter
                        <span class="w-2 h-2 bg-cyber-cyan rounded-full animate-pulse"></span>
                    </span>
                </div>
                <div class="absolute -bottom-8 left-1/2 transform -translate-x-1/2 text-xs text-gray-500 font-mono opacity-0 group-hover:opacity-100 transition-opacity">
                    [ Press Me ]
                </div>
            </div>

            <!-- Stats -->
            <div class="mt-20 grid grid-cols-1 sm:grid-cols-3 gap-6 gap-8 max-w-2xl mx-auto opacity-60">
                <div class="text-center">
                    <div class="text-2xl md:text-3xl font-display font-bold text-white"> 15+ </div>
                    <div class="text-xs text-cyber-cyan font-mono mt-1"> STATES </div>
                </div>
                <div class="text-center border-x border-cyber-gray">
                    <div class="text-2xl md:text-3xl font-display font-bold text-white"> 98% </div>
                    <div class="text-xs text-cyber-cyan font-mono mt-1"> SATISFACTION </div>
                </div>
                <div class="text-center">
                    <div class="text-2xl md:text-3xl font-display font-bold text-white"> 24/7 </div>
                    <div class="text-xs text-cyber-cyan font-mono mt-1"> SUPPORT </div>
                </div>
            </div>
        </div>

        <!-- Corner Decorations -->
        <div class="absolute top-8 left-8 w-16 h-16 md:w-32 md:h-32 border-l-2 border-t-2 border-cyber-cyan/30"></div>
        <div class="absolute top-8 right-8 w-16 h-16 md:w-32 md:h-32 border-r-2 border-t-2 border-cyber-cyan/30"></div>
        <div class="absolute bottom-8 left-8 w-16 h-16 md:w-32 md:h-32 border-l-2 border-b-2 border-cyber-cyan/30"></div>
        <div class="absolute bottom-8 right-8 w-16 h-16 md:w-32 md:h-32 border-r-2 border-b-2 border-cyber-cyan/30"></div>

        <!-- Version -->
        <div class="absolute bottom-4 left-8 text-xs font-mono text-gray-600">
            Powered By Sameer
        </div>
        <div class="absolute bottom-4 right-8 text-xs font-mono text-gray-600">
            EST. 2025
        </div>
    </div>
	
    <script>
	
        // Custom Cursor
        const cursor = document.getElementById('cursor');
        const cursorDot = document.getElementById('cursorDot');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
            cursorDot.style.left = e.clientX - 2 + 'px';
            cursorDot.style.top = e.clientY - 2 + 'px';
        });

        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'scale(0.8)';
        });

        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'scale(1)';
        });

        // Hover effects for interactive elements
        const interactiveElements = document.querySelectorAll('button, a, .service-card, #enterHint');
        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.classList.add('cursor-hover');
            });
            el.addEventListener('mouseleave', () => {
                cursor.classList.remove('cursor-hover');
            });
        });

        // Typing Effect
        const text = "Sheer | Zumbie | Faizi";
        const typingElement = document.getElementById('typingText');
        let i = 0;
        
        function typeWriter() {
            if (i < text.length) {
                typingElement.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }
        
        setTimeout(typeWriter, 1000);

        // Ripple Effect on Click
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = e.clientX - 50 + 'px';
            ripple.style.top = e.clientY - 50 + 'px';
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            document.body.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        });

        // Page Transition Logic
        const landingPage = document.getElementById('landingPage');
        const servicesPage = document.getElementById('servicesPage');
        const pageTransition = document.getElementById('pageTransition');
        const backBtn = document.getElementById('backBtn');

        function enterSite() {
        // 1️⃣ Start the page transition animation
        pageTransition.classList.add('active');

        // 2️⃣ Fade out the landing page for smooth effect
         landingPage.style.opacity = '0';
         landingPage.style.pointerEvents = 'none';

        // 3️⃣ Wait for the transition animation to finish
         setTimeout(() => {
        // 4️⃣ Redirect to the next page (index.html)
         window.location.href = 'LandingPage.html';  // <-- Change path if your next page is in a folder
           }, 800); // 800ms = same as your CSS transition
         }
		 
        function returnToLanding() {
            pageTransition.classList.add('active');
            
            setTimeout(() => {
                servicesPage.style.transform = 'translateY(100%)';
                landingPage.style.opacity = '1';
                landingPage.style.pointerEvents = 'auto';
            }, 400);

            setTimeout(() => {
                pageTransition.classList.remove('active');
            }, 800);
        }

        // Click anywhere to enter
        document.getElementById('enterHint').addEventListener('click', (e) => {
        e.stopPropagation();
        enterSite();
        });

        // Back button
        backBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            returnToLanding();
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && landingPage.style.opacity !== '0') {
                enterSite();
            }
            if (e.key === 'Escape' && servicesPage.style.transform === 'translateY(0px)') {
                returnToLanding();
            }
        });

        // Parallax effect for background elements
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            
            const circles = document.querySelectorAll('.animate-pulse-slow');
            circles.forEach((circle, index) => {
                const speed = (index + 1) * 20;
                const x = (window.innerWidth / 2 - e.clientX) / speed;
                const y = (window.innerHeight / 2 - e.clientY) / speed;
                circle.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // Service cards stagger animation
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }, index * 100);
                }
            });
        }, observerOptions);

        // Initialize service cards animation
        document.querySelectorAll('.service-card').forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transition = 'all 0.6s ease';
            observer.observe(card);
        });
    </script>
</body>
</html>
